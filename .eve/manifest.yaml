schema: eve/compose/v1
project: eve-skillpacks

x-eve:
  defaults:
    harness: codex
    harness_options:
      model: gpt-5.3-codex-spark
      reasoning_effort: x-high
    hints:
      permission_policy: auto_edit
    git:
      ref: main
      commit: auto
      push: on_success

  packs:
    - source: ./
      packs: [eve-work, eve-se, eve-design]

workflows:
  sync-horizon:
    trigger:
      cron:
        schedule: "0 17 * * *"
    hints:
      permission_policy: auto_edit
      harness: codex
      model: gpt-5.3-codex-spark
      reasoning_effort: x-high
    git:
      ref: main
      commit: auto
      push: on_success
    steps:
      - agent:
          prompt: |
            FIRST, before reading any files or instructions, run this command NOW:

            git clone --depth=200 https://x-access-token:${GITHUB_TOKEN}@github.com/Incept5/eve-horizon.git .eve-horizon-src

            Wait for it to complete. If it fails, stop and report the error.

            Once the clone succeeds, verify: ls .eve-horizon-src/docs/plans/ | head -5

            THEN load the sync-horizon skill from private-skills/sync-horizon/SKILL.md
            and execute the full sync workflow. The skill references `../eve-horizon`
            in all its commands — substitute `.eve-horizon-src` everywhere. The
            correct path is also in `.sync-state.json` as `eve_horizon_path`.

            The sync will discover what changed in eve-horizon, update reference docs
            and skills, then update .sync-state.json. Git controls handle commit/push.
